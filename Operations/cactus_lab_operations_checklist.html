
<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.wrap{padding:1rem 0}
.top-bar{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.overall-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.overall-title{font-size:15px;font-weight:500}
.overall-count{font-size:13px;color:var(--color-text-secondary)}
.progress-track{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width 0.3s}
.section-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.sec-tab{font-size:12px;padding:6px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary);display:flex;align-items:center;gap:6px}
.sec-tab.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.sec-tab .badge{font-size:10px;background:rgba(255,255,255,0.2);padding:1px 5px;border-radius:10px}
.sec-tab:not(.active) .badge{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.section-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.section-title{font-size:16px;font-weight:500}
.section-prog{font-size:12px;color:var(--color-text-secondary)}
.subsection{margin-bottom:1.25rem}
.subsection-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;padding-left:2px}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:7px 8px;border-radius:var(--border-radius-md);cursor:pointer;transition:background 0.15s}
.check-item:hover{background:var(--color-background-secondary)}
.check-item input[type=checkbox]{margin-top:2px;flex-shrink:0;cursor:pointer;accent-color:#1D9E75;width:15px;height:15px}
.check-item label{font-size:13px;color:var(--color-text-primary);cursor:pointer;line-height:1.5}
.check-item.done label{color:var(--color-text-tertiary);text-decoration:line-through}
.priority-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;margin-left:6px;vertical-align:middle}
.p-high{background:#FAECE7;color:#993C1D}
.p-med{background:#FAEEDA;color:#854F0B}
.p-low{background:#E1F5EE;color:#0F6E56}
.btn-review{display:block;width:100%;margin-top:1.25rem;padding:10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;font-size:13px;text-align:center}
.btn-review:hover{background:var(--color-background-primary);border-color:var(--color-border-primary)}
</style>

<h2 class="sr-only">Cactus Lab complete operations and growth checklist</h2>

<div class="wrap">
  <div class="top-bar">
    <div class="overall-label">
      <span class="overall-title">Cactus Lab — agency operations checklist</span>
      <span class="overall-count" id="overall-count">0 / 0 completed</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="overall-bar" style="width:0%"></div></div>
  </div>

  <div class="section-tabs" id="sec-tabs"></div>
  <div class="section-card" id="sec-content"></div>
</div>

<script>
const SECTIONS=[
{id:'sales',label:'Sales system',icon:'ti-chart-bar',items:[
  {sub:'Lead generation',items:[
    {t:'Set up Cactus Lab Instagram — 12+ posts before any outreach begins',p:'high'},
    {t:'Write a one-line bio: "We make short videos for UAE businesses. You stay off camera."',p:'high'},
    {t:'Add a highlight reel to IG profile: best Pet\'s Delight results and BTS clips',p:'high'},
    {t:'Build a saved list of prospecting hashtags per niche (#dubaigarage, #dubaiperfume, #dubairecruiter, #dubaiwatch, #dubaispices)',p:'high'},
    {t:'Set up Google Maps saved searches for each niche in Dubai and Sharjah — use these to find walk-in targets',p:'med'},
    {t:'Set up WhatsApp Business with Cactus Lab name, profile photo, and business description',p:'high'},
    {t:'Define daily lead target: find 40–50, message 30, minimum',p:'high'},
    {t:'Create a weekly walk-in area rotation: Al Quoz Mon, Deira Tue, Sharjah Industrial Thu',p:'med'},
  ]},
  {sub:'Outreach system',items:[
    {t:'Write 3 DM openers — one per niche cluster (perfume/watch, car, recruitment) — personalised first line + clear hook',p:'high'},
    {t:'Write a WhatsApp cold opener template for walk-in follow-ups',p:'high'},
    {t:'Block 9am–10:30am every morning as outreach-only time. No client work during this window.',p:'high'},
    {t:'Log every lead in the pipeline tracker immediately after messaging — name, channel, date',p:'high'},
    {t:'Never DM from a hollow account — verify profile looks credible before each outreach session',p:'med'},
  ]},
  {sub:'Follow-up cadence',items:[
    {t:'Write and save a Day 3 follow-up message ("just checking if you had a chance to see this")',p:'high'},
    {t:'Write and save a Day 7 final touch message ("last follow-up — happy to show you what we did for a similar brand")',p:'high'},
    {t:'After 2 no-replies, move lead to a "30-day warm-up" list — re-engage next month',p:'med'},
    {t:'Every Friday: review all "Replied" leads and push every open conversation forward',p:'high'},
  ]},
  {sub:'Closing',items:[
    {t:'Build a simple WhatsApp pitch structure: problem → solution → proof → offer → 48hr close',p:'high'},
    {t:'Create a Google Drive "proof folder" with Pet\'s Delight content, metrics screenshot, account growth',p:'high'},
    {t:'Anchor at AED 5,500 — do not open at 4,500. Discount is your closing lever, not your opening price.',p:'high'},
    {t:'Prepare 3 objection responses: "too expensive", "let me think about it", "we already do it in-house"',p:'high'},
    {t:'Set a 48-hour decision deadline on every verbal agreement',p:'high'},
    {t:'Close via WhatsApp voice note or call — not a text thread',p:'med'},
  ]},
  {sub:'Referrals',items:[
    {t:'Ask Pet\'s Delight for 3 warm introductions this month',p:'high'},
    {t:'Create a simple referral incentive: 1 free month for each referred client who signs',p:'med'},
    {t:'After every closed deal: ask the new client within 2 weeks if they know anyone who could benefit',p:'med'},
  ]},
]},

{id:'ops',label:'Operations',icon:'ti-settings',items:[
  {sub:'Monthly client workflow',items:[
    {t:'Set a fixed content planning call at the start of each month — 20 min max, never longer',p:'high'},
    {t:'Use a fixed monthly content calendar template (Google Sheets) — same format for every client',p:'high'},
    {t:'Script all 15 videos in week 1 of each month',p:'high'},
    {t:'Batch all filming into 1–2 dedicated shoot days per client per month',p:'high'},
    {t:'Send raw footage to editor within 24hrs of shoot day',p:'high'},
    {t:'Editor turnaround: 48hrs per video (define this in your editor agreement)',p:'high'},
    {t:'Review and approve all edits within 24hrs of receiving them',p:'high'},
    {t:'Schedule all 15 posts using a scheduling tool (Later or Buffer) — never post manually',p:'high'},
    {t:'Story reposts done daily — max 15 mins per client per day',p:'med'},
    {t:'Monthly performance report sent to client by day 3 of the following month',p:'high'},
  ]},
  {sub:'Quality control',items:[
    {t:'Create a pre-publish video checklist: hook in first 2 seconds, captions accurate, CTA clear, correct aspect ratio',p:'high'},
    {t:'Build caption templates for each content type: educational, comedic, brand story, testimonial',p:'med'},
    {t:'Define revision limit: 1 round of revisions per video — written into every contract',p:'high'},
    {t:'Never post anything without a review pass — even story reposts',p:'med'},
  ]},
  {sub:'File management',items:[
    {t:'Google Drive folder structure: /Clients/[Name]/[Month]/Raw — Edited — Posted — Reports',p:'high'},
    {t:'File naming convention: ClientName_VideoTitle_MonthYear_v1.mp4',p:'med'},
    {t:'Editor access via shared Drive folder only — no WhatsApp file transfers',p:'high'},
    {t:'Monthly archive: move previous month\'s folder to /Archive after reporting',p:'low'},
  ]},
]},

{id:'onboarding',label:'Onboarding & retention',icon:'ti-users',items:[
  {sub:'Client onboarding',items:[
    {t:'Send a welcome WhatsApp message the same day the contract is signed',p:'high'},
    {t:'Send onboarding form (Google Form): brand colours, tone of voice, competitors, goals, IG credentials',p:'high'},
    {t:'Book onboarding call within 48hrs of signing: 30 min, cover scope, revision policy, communication norms',p:'high'},
    {t:'Create a dedicated WhatsApp chat per client — never mix clients in one group',p:'high'},
    {t:'Create their Google Drive folder on day 1',p:'high'},
    {t:'Send first content plan within 5 business days of signing',p:'high'},
    {t:'Set client expectations clearly: posts go live on schedule — approvals must come within 24hrs',p:'high'},
  ]},
  {sub:'Retention system',items:[
    {t:'Send a short performance update every 2 weeks — views, followers gained, top post',p:'high'},
    {t:'Monthly check-in call: 20 min — results, upcoming month plan, any feedback',p:'high'},
    {t:'Ask for written feedback after month 2 — use this as a testimonial if positive',p:'med'},
    {t:'Proactively suggest 2 new content ideas each month before the client asks',p:'med'},
    {t:'Start renewal conversation at month 2 (for 3-month contracts)',p:'high'},
    {t:'After month 3: offer a loyalty incentive for 6-month commitment (AED 500 off monthly)',p:'low'},
  ]},
]},

{id:'admin',label:'Admin & finance',icon:'ti-file',items:[
  {sub:'Legal',items:[
    {t:'Get a standard service contract template — bilingual EN/AR preferred for UAE',p:'high'},
    {t:'Contract must include: scope of work, 15 videos per month, 1 revision round, 30-day cancellation notice, payment terms',p:'high'},
    {t:'Send contracts as PDF via WhatsApp — request signed copy back before work begins',p:'high'},
    {t:'Store all signed contracts in Drive: /Admin/Contracts/[Client Name]',p:'high'},
    {t:'Never start work without a signed contract and first invoice paid',p:'high'},
  ]},
  {sub:'Invoicing',items:[
    {t:'Set up Wave (free) or Zoho Invoice for professional, trackable invoices',p:'high'},
    {t:'Invoice sent on the 1st of each month',p:'high'},
    {t:'Payment due by the 5th of each month',p:'high'},
    {t:'Late payment clause in contract: follow-up on day 6, pause on day 15',p:'med'},
    {t:'Log every payment in the finance tracker on receipt',p:'high'},
    {t:'Track monthly revenue vs target (AED 5,500 × number of clients)',p:'high'},
  ]},
  {sub:'Banking & costs',items:[
    {t:'Open a dedicated business bank account (Wio Business or Emirates NBD business)',p:'high'},
    {t:'All client payments received into business account only',p:'high'},
    {t:'All operating costs (editor, tools, travel) paid from business account',p:'med'},
    {t:'Keep monthly cost log — current target: keep operating costs under AED 3,000 until 5 clients',p:'med'},
  ]},
]},

{id:'tools',label:'Tools & platforms',icon:'ti-tools',items:[
  {sub:'Communication',items:[
    {t:'WhatsApp Business app installed with Cactus Lab name, logo, and description',p:'high'},
    {t:'Set business hours in WhatsApp Business profile (e.g. 9am–7pm, Mon–Sat)',p:'med'},
    {t:'Set an away message for outside hours',p:'med'},
    {t:'Dedicated WhatsApp chat per client — labelled with client name',p:'high'},
    {t:'Use WhatsApp Business "Labels" to tag leads by stage (New, Replied, Proposal, Client)',p:'med'},
  ]},
  {sub:'Content & scheduling',items:[
    {t:'Scheduling tool live: Later or Buffer (AED 80–120/month) — used for all 15 posts per client',p:'high'},
    {t:'Canva Pro for static posts and caption graphics (AED 150/month)',p:'med'},
    {t:'Editor uses CapCut or Premiere Pro — confirm their setup is professional-grade',p:'high'},
    {t:'Google Drive as the only file transfer system — no personal file-sharing apps',p:'high'},
  ]},
  {sub:'Tracking & management',items:[
    {t:'Pipeline tracker (CRM) updated every morning before outreach session',p:'high'},
    {t:'Finance tracker updated every time an invoice is sent or payment received',p:'high'},
    {t:'Google Calendar: all shoot days, client calls, and deadlines blocked in advance',p:'high'},
    {t:'Notion or Google Sheets as master operations hub — all SOPs, templates, and resources in one place',p:'med'},
  ]},
]},

{id:'marketing',label:'Own marketing',icon:'ti-speakerphone',items:[
  {sub:'Cactus Lab Instagram',items:[
    {t:'Post 3x per week minimum on Cactus Lab IG — always short-form video, never static-only',p:'high'},
    {t:'Content pillars: BTS of shoots, client results (with permission), content tips, niche-specific hooks',p:'high'},
    {t:'Never post "we offer social media management" — show the work, show results, show the process',p:'high'},
    {t:'Use your own IG as a live case study: document growth from 0 to 1,000 to 10,000',p:'med'},
    {t:'Target to 1,000 followers before leading with growth as a pitch point',p:'med'},
  ]},
  {sub:'Outbound content marketing',items:[
    {t:'Run one niche-targeted DM campaign per week — same niche, 30 businesses in one day',p:'high'},
    {t:'Create one "results post" per closed client (before/after content quality, follower growth)',p:'high'},
    {t:'Post one "behind the shoot" reel per week — builds trust with potential clients watching your page',p:'med'},
    {t:'Collect one video testimonial from Pet\'s Delight this month and post it',p:'high'},
  ]},
  {sub:'Positioning',items:[
    {t:'Pick one positioning line and use it everywhere: "Content that actually works — without you lifting a finger"',p:'med'},
    {t:'Make "no client on set needed" a feature in every pitch and every IG bio',p:'high'},
    {t:'Every piece of Cactus Lab content should demonstrate — not describe — what you do',p:'high'},
  ]},
]},

{id:'team',label:'Team & hiring',icon:'ti-user-plus',items:[
  {sub:'Current setup (0–3 clients)',items:[
    {t:'Define editor SLA in writing: 48hr turnaround, 1 revision round included, additional revisions charged',p:'high'},
    {t:'Pay editor per video delivered — not monthly salary. Keeps costs variable as you scale.',p:'high'},
    {t:'Document your shoot workflow: gear checklist, shot list template, minimum shots per video type',p:'med'},
    {t:'No full-time hires until you have 5 paying clients — keep the cost base lean',p:'high'},
  ]},
  {sub:'Scaling triggers',items:[
    {t:'At 4 clients: hire a part-time content coordinator for scheduling, captions, and story reposts — AED 2,000–3,000/month',p:'med'},
    {t:'At 6 clients: bring in a second shooter on a per-project revenue share (not salary)',p:'med'},
    {t:'At 8 clients: operations coordinator to manage client communication and reporting',p:'low'},
    {t:'At 10 clients: review full team structure — this is agency stage, not freelancer stage',p:'low'},
  ]},
  {sub:'Hiring principles',items:[
    {t:'Never hire someone to fix a problem — hire someone to scale a solution that already works',p:'med'},
    {t:'Trial every hire with a paid test project before committing to a retainer',p:'high'},
    {t:'Keep all non-founder roles variable cost until revenue is consistent for 3+ months',p:'high'},
  ]},
]},
];

let checked={};
let currentSec=0;

function totalItems(){return SECTIONS.reduce((a,s)=>a+s.items.reduce((b,g)=>b+g.items.length,0),0);}
function checkedCount(){return Object.values(checked).filter(Boolean).length;}
function secCheckedCount(sid){
  const s=SECTIONS.find(x=>x.id===sid);
  return s.items.reduce((a,g)=>a+g.items.filter((_,i)=>checked[sid+'_'+g.sub+'_'+i]).length,0);
}
function secTotalCount(sid){
  const s=SECTIONS.find(x=>x.id===sid);
  return s.items.reduce((a,g)=>a+g.items.length,0);
}

function renderTopBar(){
  const total=totalItems(),done=checkedCount();
  document.getElementById('overall-count').textContent=done+' / '+total+' completed';
  document.getElementById('overall-bar').style.width=Math.round(done/total*100)+'%';
}

function renderTabs(){
  document.getElementById('sec-tabs').innerHTML=SECTIONS.map((s,i)=>{
    const done=secCheckedCount(s.id),tot=secTotalCount(s.id);
    return`<button class="sec-tab ${i===currentSec?'active':''}" onclick="goSec(${i})">
      <i class="ti ${s.icon}" aria-hidden="true" style="font-size:14px"></i>
      ${s.label}
      <span class="badge">${done}/${tot}</span>
    </button>`;
  }).join('');
}

function renderSection(){
  const s=SECTIONS[currentSec];
  const done=secCheckedCount(s.id),tot=secTotalCount(s.id);
  let html=`<div class="section-header">
    <span class="section-title">${s.label}</span>
    <span class="section-prog">${done} of ${tot} done</span>
  </div>`;
  s.items.forEach(group=>{
    html+=`<div class="subsection"><div class="subsection-label">${group.sub}</div>`;
    group.items.forEach((item,i)=>{
      const key=s.id+'_'+group.sub+'_'+i;
      const done=checked[key];
      const ptag=item.p==='high'?'<span class="priority-tag p-high">high</span>':item.p==='med'?'<span class="priority-tag p-med">med</span>':'<span class="priority-tag p-low">low</span>';
      html+=`<div class="check-item ${done?'done':''}" onclick="toggle('${key}')">
        <input type="checkbox" ${done?'checked':''} onclick="event.stopPropagation();toggle('${key}')" />
        <label>${item.t}${ptag}</label>
      </div>`;
    });
    html+=`</div>`;
  });
  const prompt=`Section checked: "${s.label}". Here is what I already have set up in this area — please adjust the remaining steps accordingly and tell me what to prioritise next: `;
  html+=`<button class="btn-review" onclick="sendPrompt('${prompt}')"><i class="ti ti-checkbox" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>I've reviewed this section — tell me what to prioritise next ↗</button>`;
  document.getElementById('sec-content').innerHTML=html;
}

function toggle(key){
  checked[key]=!checked[key];
  renderTopBar();
  renderTabs();
  renderSection();
}

function goSec(i){
  currentSec=i;
  renderTabs();
  renderSection();
}

renderTopBar();
renderTabs();
renderSection();
</script>
